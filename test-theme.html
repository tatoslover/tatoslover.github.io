<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            /* Light theme (default) */
            --bg: #e6d2a6;
            --text: #000000;
            --accent: #8b4513;
            --button-bg: #dcc9a6;
            --button-text: #000000;
            --nav-bg: rgba(139, 69, 19, 0.95);
            --nav-text: #ffffff;
        }

        html.manual-theme body.light-theme {
            --bg: #e6d2a6;
            --text: #000000;
            --accent: #8b4513;
            --button-bg: #dcc9a6;
            --button-text: #000000;
            --nav-bg: rgba(139, 69, 19, 0.95);
            --nav-text: #ffffff;
        }

        html.manual-theme body.dark-theme {
            --bg: #1e1e2f;
            --text: #c0c0c0;
            --accent: #4682b4;
            --button-bg: #2c3e50;
            --button-text: silver;
            --nav-bg: rgba(70, 130, 180, 0.95);
            --nav-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        .test-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .header {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .theme-toggle {
            background: var(--button-bg);
            color: var(--button-text);
            border: 2px solid var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: var(--nav-text);
            transform: scale(1.05);
        }

        .content-section {
            background-color: var(--button-bg);
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 2px solid var(--accent);
        }

        .status {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 8px;
            background-color: var(--nav-bg);
            color: var(--nav-text);
        }

        .debug-info {
            text-align: left;
            font-family: monospace;
            background-color: var(--accent);
            color: var(--nav-text);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            white-space: pre-wrap;
        }

        /* Dark theme specific overrides */
        body.dark-theme .content-section {
            background-color: #2a2a3d;
        }

        body.dark-theme .debug-info {
            background-color: #4682b4;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="header">
            <h1>Theme Toggle Test</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <i class="fas fa-moon"></i>
                <span>Theme</span>
            </button>
        </div>

        <div class="content-section">
            <h2>Theme Status</h2>
            <div id="theme-status" class="status">Light Theme Active</div>

            <p></p>Click the theme button above to switch between light and dark themes.</p>
            <p>This should change the background colors, text colors, and button icon.</p>
        </div>

        <div class="content-section">
            <h2>Debug Information</h2>
            <div id="debug-info" class="debug-info">Loading...</div>
        </div>
    </div>

    <script>
        console.log("🚀 Theme toggle test script starting...");

        document.addEventListener("DOMContentLoaded", function() {
            console.log("✅ DOM Content Loaded");

            const themeToggle = document.getElementById("theme-toggle");
            const themeStatus = document.getElementById("theme-status");
            const debugInfo = document.getElementById("debug-info");

            function updateDebugInfo() {
                const body = document.body;
                const html = document.documentElement;

                debugInfo.textContent = `
Current Time: ${new Date().toLocaleTimeString()}
HTML Classes: ${html.className}
Body Classes: ${body.className}
Computed Background: ${getComputedStyle(body).backgroundColor}
Computed Color: ${getComputedStyle(body).color}
Theme Toggle Found: ${!!themeToggle}
Icon Element: ${themeToggle ? themeToggle.querySelector('i').className : 'N/A'}
Local Storage: ${localStorage.getItem('theme') || 'Not set'}
                `.trim();
            }

            if (themeToggle) {
                console.log("✅ Theme toggle button found:", themeToggle);

                const body = document.body;
                const html = document.documentElement;
                const icon = themeToggle.querySelector("i");

                console.log("✅ Icon element found:", icon);

                // Enable manual theme control
                html.classList.add("manual-theme");

                // Check for saved theme preference
                const savedTheme = localStorage.getItem("theme") || "light";
                console.log("💾 Saved theme:", savedTheme);

                // Apply initial theme
                if (savedTheme === "dark") {
                    body.classList.add("dark-theme");
                    body.classList.remove("light-theme");
                    if (icon) {
                        icon.classList.remove("fa-moon");
                        icon.classList.add("fa-sun");
                    }
                    themeStatus.textContent = "Dark Theme Active";
                } else {
                    body.classList.add("light-theme");
                    body.classList.remove("dark-theme");
                    if (icon) {
                        icon.classList.remove("fa-sun");
                        icon.classList.add("fa-moon");
                    }
                    themeStatus.textContent = "Light Theme Active";
                }

                // Update debug info initially
                updateDebugInfo();

                // Theme toggle event listener
                themeToggle.addEventListener("click", function(e) {
                    e.preventDefault();
                    console.log("🎨 Theme toggle clicked!");

                    if (body.classList.contains("dark-theme")) {
                        // Switch to light mode
                        console.log("☀️ Switching to light mode");
                        body.classList.remove("dark-theme");
                        body.classList.add("light-theme");
                        if (icon) {
                            icon.classList.remove("fa-sun");
                            icon.classList.add("fa-moon");
                        }
                        themeStatus.textContent = "Light Theme Active";
                        localStorage.setItem("theme", "light");
                    } else {
                        // Switch to dark mode
                        console.log("🌙 Switching to dark mode");
                        body.classList.remove("light-theme");
                        body.classList.add("dark-theme");
                        if (icon) {
                            icon.classList.remove("fa-moon");
                            icon.classList.add("fa-sun");
                        }
                        themeStatus.textContent = "Dark Theme Active";
                        localStorage.setItem("theme", "dark");
                    }

                    // Update debug info after change
                    setTimeout(updateDebugInfo, 100);
                });

                console.log("✅ Theme toggle setup complete");

            } else {
                console.error("❌ Theme toggle button not found!");
                debugInfo.textContent = "ERROR: Theme toggle button not found!";
            }

            // Update debug info every 2 seconds
            setInterval(updateDebugInfo, 2000);
        });

        console.log("📝 Theme toggle test script loaded");
    </script>
</body>
</html>
